<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>問卷 CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, "Noto Sans TC", sans-serif; background:#eef3f8; }
    [hidden] { display:none !important; }
  </style>
</head>
<body class="min-h-screen text-slate-900">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl font-black">問卷 CRM</h1>
        <p class="text-sm text-slate-500 mt-1">查看、回溯與下載 LINE 問卷受眾資料。</p>
      </div>
      <div class="flex gap-2">
        <a href="/monitor" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-bold">聊天室監控</a>
        <a href="/broadcast" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-bold">分時推播</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6 space-y-5">
    <section class="bg-white border border-slate-200 rounded-2xl p-5">
      <div class="mb-5 rounded-2xl bg-slate-50 border border-slate-200 p-4">
        <div class="flex flex-wrap items-end gap-3">
          <label class="block text-sm font-bold text-slate-600 min-w-[280px] flex-1">管理員密碼
            <input id="password" type="password" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-3 outline-none focus:border-emerald-500" placeholder="輸入管理員密碼">
          </label>
          <button id="login" type="button" class="rounded-xl bg-emerald-500 text-white px-6 py-3 font-bold">登入 CRM</button>
          <span id="auth-status" class="rounded-xl bg-amber-50 text-amber-700 px-4 py-3 text-sm font-bold">尚未登入</span>
        </div>
      </div>
      <div class="grid grid-cols-6 gap-3 items-end">
        <label class="block text-sm font-bold text-slate-600">性別
          <select id="gender" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-3 outline-none focus:border-emerald-500">
            <option value="">不限</option>
            <option value="女性">女性</option>
            <option value="男性">男性</option>
            <option value="其他/不便透露">其他/不便透露</option>
          </select>
        </label>
        <label class="block text-sm font-bold text-slate-600">居住地區
          <select id="residence-area" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-3 outline-none focus:border-emerald-500">
            <option value="">不限</option>
            <option value="臺南市">臺南市</option>
            <option value="高雄/屏東">高雄/屏東</option>
            <option value="嘉義/雲林">嘉義/雲林</option>
            <option value="中彰投">中彰投</option>
            <option value="北北基桃">北北基桃</option>
            <option value="其他地區">其他地區</option>
          </select>
        </label>
        <label class="block text-sm font-bold text-slate-600">完成狀態
          <select id="completed" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-3 outline-none focus:border-emerald-500">
            <option value="">不限</option>
            <option value="1">已完成</option>
            <option value="0">未完成</option>
          </select>
        </label>
        <label class="block text-sm font-bold text-slate-600">筆數
          <input id="limit" type="number" value="500" min="1" max="5000" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-3 outline-none focus:border-emerald-500">
        </label>
        <label class="block text-sm font-bold text-slate-600 col-span-2">搜尋
          <input id="search" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-3 outline-none focus:border-emerald-500" placeholder="姓名、UID、標籤、答案">
        </label>
        <div class="col-span-4 flex flex-wrap gap-2">
          <button id="load" type="button" data-auth-action class="rounded-xl bg-slate-900 text-white px-5 py-3 font-bold disabled:bg-slate-300 disabled:cursor-not-allowed">載入 CRM</button>
          <button id="backfill" type="button" data-auth-action class="rounded-xl bg-emerald-500 text-white px-5 py-3 font-bold disabled:bg-slate-300 disabled:cursor-not-allowed">回溯修正居住地區</button>
          <button id="download" type="button" data-auth-action class="rounded-xl border border-slate-300 px-5 py-3 font-bold disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed">下載 CSV</button>
          <span id="status" class="px-3 py-3 text-sm text-slate-500"></span>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-4 gap-3">
      <div class="rounded-2xl bg-white border border-slate-200 p-4"><p class="text-xs font-bold text-slate-400">總筆數</p><b id="count" class="text-3xl">0</b><p id="summary-updated" class="mt-2 text-xs text-slate-400">尚未載入</p></div>
      <div class="rounded-2xl bg-white border border-slate-200 p-4"><p class="text-xs font-bold text-slate-400">完成率</p><b id="completion-rate" class="text-3xl">0%</b><p id="done-detail" class="mt-2 text-xs text-slate-400">0 / 0</p></div>
      <div class="rounded-2xl bg-white border border-slate-200 p-4"><p class="text-xs font-bold text-slate-400">最大居住地</p><b id="top-area" class="text-2xl">-</b><p id="top-area-count" class="mt-2 text-xs text-slate-400">0 人</p></div>
      <div class="rounded-2xl bg-white border border-slate-200 p-4"><p class="text-xs font-bold text-slate-400">主要客群</p><b id="top-party" class="text-2xl">-</b><p id="top-party-count" class="mt-2 text-xs text-slate-400">0 人</p></div>
    </section>

    <section class="grid grid-cols-12 gap-4">
      <div class="col-span-4 rounded-2xl bg-white border border-slate-200 p-5">
        <div class="flex items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-black">性別分布</h2>
          <span id="gender-total" class="text-xs font-bold text-slate-400">0 人</span>
        </div>
        <div id="gender-bars" class="space-y-3"></div>
      </div>
      <div class="col-span-4 rounded-2xl bg-white border border-slate-200 p-5">
        <div class="flex items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-black">居住地區排行</h2>
          <span class="text-xs font-bold text-slate-400">問卷回答</span>
        </div>
        <div id="area-bars" class="space-y-3"></div>
      </div>
      <div class="col-span-4 rounded-2xl bg-white border border-slate-200 p-5">
        <div class="flex items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-black">旅遊興趣</h2>
          <span class="text-xs font-bold text-slate-400">點數受眾</span>
        </div>
        <div id="interest-bars" class="space-y-3"></div>
      </div>
      <div class="col-span-4 rounded-2xl bg-white border border-slate-200 p-5">
        <div class="flex items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-black">同行型態</h2>
          <span class="text-xs font-bold text-slate-400">分眾用途</span>
        </div>
        <div id="party-bars" class="space-y-3"></div>
      </div>
      <div class="col-span-4 rounded-2xl bg-white border border-slate-200 p-5">
        <div class="flex items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-black">住宿偏好</h2>
          <span class="text-xs font-bold text-slate-400">推薦用途</span>
        </div>
        <div id="lodging-bars" class="space-y-3"></div>
      </div>
      <div class="col-span-4 rounded-2xl bg-white border border-slate-200 p-5">
        <div class="flex items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-black">預算區間</h2>
          <span class="text-xs font-bold text-slate-400">推播分層</span>
        </div>
        <div id="budget-bars" class="space-y-3"></div>
      </div>
    </section>

    <section class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 text-slate-500">
            <tr>
              <th class="text-left px-4 py-3">姓名</th>
              <th class="text-left px-4 py-3">居住地區</th>
              <th class="text-left px-4 py-3">性別</th>
              <th class="text-left px-4 py-3">想了解區域</th>
              <th class="text-left px-4 py-3">同行</th>
              <th class="text-left px-4 py-3">住宿</th>
              <th class="text-left px-4 py-3">預算</th>
              <th class="text-left px-4 py-3">監控地區</th>
              <th class="text-left px-4 py-3">更新</th>
            </tr>
          </thead>
          <tbody id="rows" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let authenticated = false;
    const el = id => document.getElementById(id);
    const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const params = () => {
      const p = new URLSearchParams({ limit: el('limit').value || '500' });
      if (el('search').value.trim()) p.set('search', el('search').value.trim());
      if (el('gender').value) p.set('gender', el('gender').value);
      if (el('residence-area').value) p.set('residenceArea', el('residence-area').value);
      if (el('completed').value !== '') p.set('completed', el('completed').value);
      return p;
    };
    function setStatus(text) { el('status').textContent = text || ''; }
    function friendlyError(error = '') {
      const value = String(error || '');
      if (value === 'FORBIDDEN') return '請先登入 CRM，或密碼不正確。';
      if (value === 'MISSING_UID') return '後端尚未更新到免 UID 版本，請重新部署 Worker 後再試。';
      if (value === 'INVALID_PASSWORD') return '密碼不正確，請重新輸入。';
      return value || '操作失敗';
    }
    function setAuthenticated(value) {
      authenticated = !!value;
      document.querySelectorAll('[data-auth-action]').forEach(button => { button.disabled = !authenticated; });
      el('auth-status').textContent = authenticated ? '已登入，可以操作 CRM' : '尚未登入';
      el('auth-status').className = authenticated
        ? 'rounded-xl bg-emerald-50 text-emerald-700 px-4 py-3 text-sm font-bold'
        : 'rounded-xl bg-amber-50 text-amber-700 px-4 py-3 text-sm font-bold';
    }
    function countBy(records, key) {
      const map = new Map();
      records.forEach(record => {
        const label = String(record[key] || '未填').trim() || '未填';
        map.set(label, (map.get(label) || 0) + 1);
      });
      return [...map.entries()]
        .map(([label, count]) => ({ label, count }))
        .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, 'zh-Hant'));
    }
    function renderBars(id, rows, total, color = 'bg-emerald-500') {
      const box = el(id);
      if (!rows.length) {
        box.innerHTML = '<p class="rounded-xl bg-slate-50 px-3 py-4 text-sm text-slate-400">尚無資料</p>';
        return;
      }
      box.innerHTML = rows.slice(0, 6).map(row => {
        const pct = total ? Math.round(row.count / total * 100) : 0;
        return `
          <div>
            <div class="mb-1 flex items-center justify-between gap-3 text-sm">
              <b class="truncate">${escapeHtml(row.label)}</b>
              <span class="shrink-0 text-slate-500">${row.count} 人 · ${pct}%</span>
            </div>
            <div class="h-3 overflow-hidden rounded-full bg-slate-100">
              <div class="h-full rounded-full ${color}" style="width:${Math.max(4, pct)}%"></div>
            </div>
          </div>
        `;
      }).join('');
    }
    function renderAnalytics(records = []) {
      const total = records.length;
      const done = records.filter(r => Number(r.completed)).length;
      const completionRate = total ? Math.round(done / total * 100) : 0;
      const areas = countBy(records, 'residenceArea');
      const parties = countBy(records, 'partyType');
      el('count').textContent = total;
      el('completion-rate').textContent = `${completionRate}%`;
      el('done-detail').textContent = `${done} / ${total}`;
      el('summary-updated').textContent = total ? `更新 ${new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}` : '尚未載入';
      el('top-area').textContent = areas[0]?.label || '-';
      el('top-area-count').textContent = `${areas[0]?.count || 0} 人`;
      el('top-party').textContent = parties[0]?.label || '-';
      el('top-party-count').textContent = `${parties[0]?.count || 0} 人`;
      el('gender-total').textContent = `${total} 人`;
      renderBars('gender-bars', countBy(records, 'gender'), total, 'bg-rose-500');
      renderBars('area-bars', areas, total, 'bg-sky-500');
      renderBars('interest-bars', countBy(records, 'interest'), total, 'bg-amber-500');
      renderBars('party-bars', parties, total, 'bg-violet-500');
      renderBars('lodging-bars', countBy(records, 'lodgingType'), total, 'bg-teal-500');
      renderBars('budget-bars', countBy(records, 'budget'), total, 'bg-slate-700');
    }
    async function login() {
      const password = el('password').value.trim();
      if (!password) throw new Error('請輸入管理員密碼');
      el('login').disabled = true;
      el('login').textContent = '登入中';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(friendlyError(data.error));
        el('password').value = '';
        setAuthenticated(true);
        setStatus('已登入');
        await load();
      } finally {
        el('login').disabled = false;
        el('login').textContent = '重新登入';
      }
    }
    function render(records = []) {
      renderAnalytics(records);
      el('rows').innerHTML = records.map(r => `
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3"><b>${escapeHtml(r.displayName || '訪客')}</b><br><span class="text-xs text-slate-400">${escapeHtml(r.lineUserId)}</span></td>
          <td class="px-4 py-3">${escapeHtml(r.residenceArea || '-')}</td>
          <td class="px-4 py-3">${escapeHtml(r.gender || '-')}</td>
          <td class="px-4 py-3">${escapeHtml(r.tainanArea || '-')}</td>
          <td class="px-4 py-3">${escapeHtml(r.partyType || '-')}</td>
          <td class="px-4 py-3">${escapeHtml(r.lodgingType || '-')}</td>
          <td class="px-4 py-3">${escapeHtml(r.budget || '-')}</td>
          <td class="px-4 py-3">${escapeHtml(r.monitorArea || '-')}<br><span class="text-xs text-slate-400">${escapeHtml(r.monitorConfidence || '')}</span></td>
          <td class="px-4 py-3 whitespace-nowrap">${escapeHtml((r.updatedAt || '').replace('T', ' ').slice(0, 16))}</td>
        </tr>
      `).join('');
    }
    async function load() {
      if (!authenticated) throw new Error('請先登入 CRM');
      setStatus('載入中...');
      const res = await fetch(`/api/survey/records?${params()}`);
      const data = await res.json();
      if (!data.success) throw new Error(friendlyError(data.error));
      render(data.data.records || []);
      setStatus(`已載入 ${data.data.count} 筆`);
    }
    el('login').addEventListener('click', () => login().catch(err => setStatus(err.message)));
    el('password').addEventListener('keydown', event => {
      if (event.key === 'Enter') login().catch(err => setStatus(err.message));
    });
    el('load').addEventListener('click', () => load().catch(err => setStatus(err.message)));
    el('backfill').addEventListener('click', async () => {
      try {
        setStatus('回溯中...');
        const res = await fetch('/api/survey/backfill-residence?limit=5000');
        const data = await res.json();
        if (!data.success) throw new Error(friendlyError(data.error));
        setStatus(`回溯完成：${data.data.updated} 筆`);
        await load();
      } catch (err) {
        setStatus(err.message);
      }
    });
    el('download').addEventListener('click', () => {
      try {
        location.href = `/api/survey/export.csv?${params()}`;
      } catch (err) {
        setStatus(err.message);
      }
    });
    fetch('/api/admin/session').then(r => r.json()).then(data => {
      setAuthenticated(data.authenticated);
      setStatus(data.authenticated ? '已登入' : '請先登入');
      if (data.authenticated) load().catch(err => setStatus(err.message));
    }).catch(() => {
      setAuthenticated(false);
      setStatus('請先登入');
    });
    setAuthenticated(false);
  </script>
</body>
</html>
